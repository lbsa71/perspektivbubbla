<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perspektivbubbla - Gruppchef</title>
    <script type="module" crossorigin src="/assets/index-Bn-a1R4c.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-iNsjrK4p.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Perspektivbubbla</h1>
          <p>Gruppchefens lägesbild</p>
        </div>
        <div class="status">
          <button type="button" data-command="open-intro">Intro</button>
          <button type="button" data-command="toggle-help">Hjälp</button>
          <button type="button" data-command="toggle-orientation" aria-pressed="true">Orientering</button>
          <button type="button" data-command="open-scenario">Scenario</button>
          <a id="game-link" class="game-link" href="/?game=main&intro=0" title="Dela detta spel">spel main</a>
          <span id="connection">FRÅNKOPPLAD</span>
          <span id="time">t=0.0</span>
          <button
            id="aar-toggle"
            class="icon-button"
            type="button"
            data-command="toggle-aar"
            aria-controls="aar-panel"
            aria-expanded="false"
            title="Visa eller dölj händelselogg"
          >
            <span class="feed-icon" aria-hidden="true"></span>
            <span class="sr-only">Visa eller dölj händelselogg</span>
          </button>
        </div>
      </header>

      <section class="layout">
        <aside class="panel command-panel">
          <nav class="info-words" aria-label="Detaljer">
            <button id="info-unit" class="info-word" type="button">Chef</button>
            <button id="info-group" class="info-word" type="button">Grupp</button>
            <button id="info-goal" class="info-word" type="button">Mål</button>
            <button id="info-orders" class="info-word" type="button">Order</button>
            <button id="info-terrain" class="info-word" type="button">Terräng</button>
          </nav>

          <h2>Grupp</h2>
          <div id="group"></div>

          <h2>Ordergivning</h2>
          <div class="mode-tabs" role="tablist" aria-label="Ordermetod">
            <button
              id="voice-tab"
              role="tab"
              aria-controls="voice-palette"
              aria-selected="true"
              data-command="communication"
              data-communication="voice"
            >
              Röst
            </button>
            <button
              id="gesture-tab"
              role="tab"
              aria-controls="gesture-palette"
              aria-selected="false"
              data-command="communication"
              data-communication="gesture"
            >
              Tecken
            </button>
            <button
              id="radio-tab"
              role="tab"
              aria-controls="radio-palette"
              aria-selected="false"
              data-command="communication"
              data-communication="radio"
            >
              Radio
            </button>
          </div>

          <div id="voice-palette" class="command-palette voice-palette" role="tabpanel" aria-labelledby="voice-tab">
            <div class="controls formation-controls" aria-label="Formationer med röst">
              <button data-command="formation" data-formation="line">Skyttelinje</button>
              <button data-command="formation" data-formation="file">Skytteled</button>
              <button data-command="formation" data-formation="column">Skyttekolonn</button>
              <button data-command="formation" data-formation="wedge">Skytteplog</button>
              <button data-command="formation" data-formation="dispersed">Skyttevarn</button>
              <button data-command="formation" data-formation="regroup">Samling</button>
            </div>
            <div class="controls movement-controls" aria-label="Rörelseorder med röst">
              <button data-command="forward">Framåt!</button>
              <button data-command="halt">Halt!</button>
            </div>
            <div class="controls retreat-controls" aria-label="Reträttorder med röst">
              <button data-command="alternating-forward">Växelvis framåt</button>
              <button data-command="alternating-retreat">Växelvis bakåt</button>
              <button data-command="zipper-retreat" data-side="left">Blixtlås vänster</button>
              <button data-command="zipper-retreat" data-side="right">Blixtlås höger</button>
            </div>
          </div>

          <div id="gesture-palette" class="command-palette gesture-palette" role="tabpanel" aria-labelledby="gesture-tab" hidden>
            <div class="controls gesture-controls" aria-label="Formationer med tecken">
              <button class="gesture-command" data-command="formation" data-formation="line" title="Skyttelinje">
                <img src="/assets/skyttelinje-DYJ3mlQu.png" alt="" aria-hidden="true" />
                <span>Skyttelinje</span>
              </button>
              <button class="gesture-command" data-command="formation" data-formation="file" title="Skytteled">
                <img src="/assets/skytteled-Z-pSCQ8Q.png" alt="" aria-hidden="true" />
                <span>Skytteled</span>
              </button>
              <button class="gesture-command" data-command="formation" data-formation="column" title="Skyttekolonn">
                <img src="/assets/skyttekolonn-BRAE9hRH.png" alt="" aria-hidden="true" />
                <span>Skyttekolonn</span>
              </button>
              <button class="gesture-command" data-command="formation" data-formation="wedge" title="Skytteplog">
                <img src="/assets/skytteplog-D4SYKSfm.png" alt="" aria-hidden="true" />
                <span>Skytteplog</span>
              </button>
              <button class="gesture-command" data-command="formation" data-formation="dispersed" title="Skyttevarn">
                <img src="/assets/skyttevarn-DlHhP6ag.png" alt="" aria-hidden="true" />
                <span>Skyttevarn</span>
              </button>
              <button class="gesture-command" data-command="formation" data-formation="regroup" title="Samling">
                <img src="/assets/samling-BBqDNs1T.png" alt="" aria-hidden="true" />
                <span>Samling</span>
              </button>
            </div>
            <div class="controls gesture-controls movement-controls" aria-label="Rörelseorder med tecken">
              <button class="gesture-command" data-command="forward" title="Framåt">
                <img src="/assets/framat_oka_hastigheten-Bi3ZqAVk.png" alt="" aria-hidden="true" />
                <span>Framåt</span>
              </button>
              <button class="gesture-command" data-command="halt" title="Halt">
                <img src="/assets/halt-CRf0yLYu.png" alt="" aria-hidden="true" />
                <span>Halt</span>
              </button>
            </div>
            <div class="controls gesture-controls retreat-controls" aria-label="Reträttorder med tecken">
              <button class="gesture-command" data-command="alternating-forward" title="Växelvis framåt">
                <img src="/assets/vaxelvis_framat_bakat-CMw7VuPm.png" alt="" aria-hidden="true" />
                <span>Växelvis framåt</span>
              </button>
              <button class="gesture-command" data-command="alternating-retreat" title="Växelvis bakåt">
                <img src="/assets/vaxelvis_framat_bakat-CMw7VuPm.png" alt="" aria-hidden="true" />
                <span>Växelvis bakåt</span>
              </button>
              <button class="gesture-command" data-command="zipper-retreat" data-side="left" title="Blixtlås vänster">
                <img src="/assets/vaxelvis_framat_bakat-CMw7VuPm.png" alt="" aria-hidden="true" />
                <span>Blixtlås vänster</span>
              </button>
              <button class="gesture-command" data-command="zipper-retreat" data-side="right" title="Blixtlås höger">
                <img src="/assets/vaxelvis_framat_bakat-CMw7VuPm.png" alt="" aria-hidden="true" />
                <span>Blixtlås höger</span>
              </button>
            </div>
          </div>

          <div id="radio-palette" class="command-palette radio-palette" role="tabpanel" aria-labelledby="radio-tab" hidden>
            <div class="controls formation-controls" aria-label="Formationer med radio">
              <button data-command="formation" data-formation="line">Skyttelinje</button>
              <button data-command="formation" data-formation="file">Skytteled</button>
              <button data-command="formation" data-formation="column">Skyttekolonn</button>
              <button data-command="formation" data-formation="wedge">Skytteplog</button>
              <button data-command="formation" data-formation="dispersed">Skyttevarn</button>
              <button data-command="formation" data-formation="regroup">Samling</button>
            </div>
            <div class="controls movement-controls" aria-label="Rörelseorder med radio">
              <button data-command="forward">Framåt!</button>
              <button data-command="halt">Halt!</button>
            </div>
            <div class="controls retreat-controls" aria-label="Reträttorder med radio">
              <button data-command="alternating-forward">Växelvis framåt</button>
              <button data-command="alternating-retreat">Växelvis bakåt</button>
              <button data-command="zipper-retreat" data-side="left">Blixtlås vänster</button>
              <button data-command="zipper-retreat" data-side="right">Blixtlås höger</button>
            </div>
          </div>

          <h2>Sjukvård</h2>
          <div class="controls casualty-controls" aria-label="Sjukvårdsorder">
            <button data-command="set-casualty-point" data-casualty-point="asa1">Sätt ÅSA1</button>
            <button data-command="set-casualty-point" data-casualty-point="asa2">Sätt ÅSA2</button>
            <button data-command="evacuate-casualty">Släpa skadad</button>
          </div>

        </aside>

        <section class="map-wrap">
          <svg id="map" role="img" aria-label="hexkarta"></svg>
          <div id="coach-panel" class="coach-panel" hidden></div>
          <div id="hex-tooltip" class="hex-tooltip" hidden></div>
        </section>

        <aside id="aar-panel" class="panel aar-panel" hidden>
          <h2>Debrief</h2>
          <div id="debrief"></div>
          <h2>Händelselogg</h2>
          <ol id="events"></ol>
        </aside>
      </section>

      <div id="intro-modal" class="product-modal-layer" hidden></div>
      <div id="help-modal" class="product-modal-layer" hidden></div>
      <div id="scenario-chooser" class="scenario-chooser"></div>
    </main>

  </body>
</html>
